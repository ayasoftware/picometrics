name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose secret access
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: |
          if [ -z "$ACR_PASSWORD" ]; then
            echo "ERROR: ACR_PASSWORD secret is empty or not accessible"
            echo "Go to: Settings → Secrets and variables → Actions → Repository secrets"
            echo "Confirm ACR_PASSWORD exists there (not under Environments)"
          else
            echo "OK: ACR_PASSWORD is set (${#ACR_PASSWORD} chars)"
          fi

      - name: Log in to Azure Container Registry
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: echo "$ACR_PASSWORD" | docker login picometricsacr.azurecr.io -u picometricsacr --password-stdin

      - name: Build and push backend image
        run: |
          docker build \
            -t picometricsacr.azurecr.io/backend:latest \
            -t picometricsacr.azurecr.io/backend:${{ github.sha }} \
            ./packages/backend
          docker push picometricsacr.azurecr.io/backend:latest
          docker push picometricsacr.azurecr.io/backend:${{ github.sha }}

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: ACR_PASSWORD
          script: |
            echo "$ACR_PASSWORD" | docker login picometricsacr.azurecr.io -u picometricsacr --password-stdin
            cd ~/marketing-ai-platform
            docker compose pull backend
            docker compose up -d --no-deps backend
            docker image prune -f
            curl -sf http://localhost:4000/health || exit 1
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
