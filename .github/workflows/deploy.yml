name: Deploy to Azure

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        run: echo "$ACR_PASSWORD" | docker login picometricsacr.azurecr.io -u "$ACR_USERNAME" --password-stdin

      - name: Build and push backend image
        run: |
          docker build \
            -t picometricsacr.azurecr.io/backend:latest \
            -t picometricsacr.azurecr.io/backend:${{ github.sha }} \
            ./packages/backend
          docker push picometricsacr.azurecr.io/backend:latest
          docker push picometricsacr.azurecr.io/backend:${{ github.sha }}

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: ACR_USERNAME,ACR_PASSWORD
          script: |
            echo "$ACR_PASSWORD" | docker login picometricsacr.azurecr.io -u "$ACR_USERNAME" --password-stdin
            cd ~/marketing-ai-platform
            docker compose pull backend
            docker compose up -d --no-deps backend
            docker image prune -f
            curl -sf http://localhost:4000/health || exit 1
        env:
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
