worker_processes auto;
events { worker_connections 1024; }

http {
  # Shared upstream definitions
  upstream open_webui  { server open-webui:8080; }
  upstream backend_api { server backend:4000; }

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Security headers
  add_header X-Frame-Options        SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy        strict-origin-when-cross-origin always;

  # Gzip
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # ── HTTP → HTTPS redirect (enable in production) ──────────────────
  # server {
  #   listen 80;
  #   server_name _;
  #   return 301 https://$host$request_uri;
  # }

  # ── Main server ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # User settings page
    location /user-settings {
      proxy_pass         http://backend_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Per-user LLM config and MCP selection APIs
    location /api/users/ {
      proxy_pass         http://backend_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # OAuth callbacks must reach our backend (registered redirect URIs)
    location /api/oauth/ {
      proxy_pass         http://backend_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    # OpenAI-compatible proxy (direct API access, e.g. curl)
    location /v1/ {
      proxy_pass         http://backend_api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_buffering    off;
      proxy_cache        off;
      proxy_read_timeout 300s;
    }

    # Backend health check
    location /health {
      proxy_pass http://backend_api;
    }

    # Everything else (including /api/) → Open WebUI and its own backend
    location / {
      proxy_pass         http://open_webui;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_read_timeout 300s;
    }
  }

  # ── HTTPS (production — uncomment and adjust) ─────────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name your.domain.com;
  #   ssl_certificate     /etc/nginx/certs/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/certs/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #   # ... same location blocks as above ...
  # }
}
